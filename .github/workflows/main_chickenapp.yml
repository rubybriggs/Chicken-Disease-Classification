# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - chickenapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: chicken.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_287B98AE94D14FC38B5DA99295717511 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_3A7E73E337A24A948FA75E6B989A6BF4 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: chicken.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_287B98AE94D14FC38B5DA99295717511 }}/chicken:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7BC0A0DE88A94E14AFCCC3AF87C9D93C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0340EE57D5154014B3F39B537CB52B7F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99257605CA164EC7AFD5DBAB01ABC3B5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'chickenapp'
          slot-name: 'Production'
          images: 'chicken.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_287B98AE94D14FC38B5DA99295717511 }}/chicken:${{ github.sha }}'
          